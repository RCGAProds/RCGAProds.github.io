<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Lista de Deseados</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f4f4f4;
        transition: background-color 0.3s, color 0.3s;
      }
      body.dark-mode {
        background-color: #121212;
        color: #ffffff;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
      }
      .header h1 {
        margin: 0;
      }
      #mode-toggle {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 24px;
        transition: color 0.3s;
        padding: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }
      #mode-toggle .sun { display: none; }
      body.dark-mode #mode-toggle .sun { display: inline; }
      body.dark-mode #mode-toggle .moon { display: none; }

      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 15px;
      }
      #search {
        flex: 1;
        min-width: 200px;
        padding: 10px 15px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.3s;
      }
      #search:focus {
        border-color: #1b9c1b;
      }
      body.dark-mode #search {
        background-color: #2a2a2a;
        border-color: #444;
        color: #fff;
      }
      body.dark-mode #search:focus {
        border-color: #4caf50;
      }
      #sort {
        padding: 10px 15px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        cursor: pointer;
        background: #fff;
        transition: border-color 0.3s;
      }
      #sort:focus {
        border-color: #1b9c1b;
      }
      body.dark-mode #sort {
        background-color: #2a2a2a;
        border-color: #444;
        color: #fff;
      }

      .filters-wrapper {
        margin-bottom: 20px;
      }
      .filters-inner {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        overflow: hidden;
        max-height: 90px;
        transition: max-height 0.3s ease;
      }
      .filters-inner.expanded {
        max-height: none;
      }
      .filter-btn {
        padding: 6px 14px;
        border: 2px solid #ddd;
        border-radius: 20px;
        background: #fff;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
        user-select: none;
      }
      .filter-btn:hover {
        border-color: #1b9c1b;
        background: #e8f5e9;
      }
      .filter-btn.active {
        background: #1b9c1b;
        color: #fff;
        border-color: #1b9c1b;
      }
      body.dark-mode .filter-btn {
        background: #2a2a2a;
        border-color: #444;
        color: #ddd;
      }
      body.dark-mode .filter-btn:hover {
        border-color: #4caf50;
        background: #1b3d1b;
      }
      body.dark-mode .filter-btn.active {
        background: #4caf50;
        border-color: #4caf50;
        color: #fff;
      }
      .show-more-btn {
        display: none;
        margin-top: 8px;
        padding: 6px 14px;
        border: 2px solid #ddd;
        border-radius: 20px;
        background: #fff;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
        color: #1b9c1b;
        transition: all 0.2s;
        user-select: none;
      }
      .show-more-btn:hover {
        border-color: #1b9c1b;
        background: #e8f5e9;
      }
      body.dark-mode .show-more-btn {
        background: #2a2a2a;
        border-color: #444;
        color: #4caf50;
      }
      body.dark-mode .show-more-btn:hover {
        border-color: #4caf50;
        background: #1b3d1b;
      }

      #game-count {
        font-size: 14px;
        color: #666;
        margin-bottom: 15px;
      }
      body.dark-mode #game-count {
        color: #aaa;
      }

      .game-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
      }
      .game-card {
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        transition: transform 0.3s ease, opacity 0.3s ease;
      }
      body.dark-mode .game-card {
        background-color: #1e1e1e;
      }
      .game-card:hover {
        transform: scale(1.05);
      }
      .game-card.hidden {
        display: none;
      }
      .game-card img {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        object-fit: cover;
      }
      .game-info {
        padding: 15px;
      }
      .game-info h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      .game-info .description {
        font-size: 13px;
        color: #555;
        margin-bottom: 10px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      body.dark-mode .game-info .description {
        color: #aaa;
      }
      .game-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 10px;
      }
      .game-tag {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        background: #e0e0e0;
        color: #333;
      }
      body.dark-mode .game-tag {
        background: #444;
        color: #ddd;
      }
      .game-price {
        color: green;
        font-weight: bold;
        text-decoration: none;
        margin-top: 10px;
      }
      body.dark-mode .game-price {
        color: #90ee90;
      }
      .game-price .original {
        text-decoration: line-through;
        color: #999;
        font-weight: normal;
        margin-right: 6px;
      }
      .game-price .discount-badge {
        background: #4caf50;
        color: #fff;
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 12px;
        margin-left: 6px;
      }
      .game-link {
        text-decoration: none;
        color: inherit;
        display: block;
      }

      #last-update {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 14px;
      }
      body.dark-mode #last-update {
        color: #aaaaaa;
      }

      #empty-msg {
        text-align: center;
        padding: 60px 20px;
        color: #888;
        font-size: 18px;
        grid-column: 1 / -1;
      }
      body.dark-mode #empty-msg {
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Mi Lista de Deseados</h1>
      <button id="mode-toggle">
        <span class="sun">☀️</span>
        <span class="moon">🌙</span>
      </button>
    </div>

    <div class="controls">
      <input type="text" id="search" placeholder="Buscar juegos..." autocomplete="off" />
      <select id="sort">
        <option value="priority">Orden por defecto</option>
        <option value="name-asc">Nombre (A-Z)</option>
        <option value="name-desc">Nombre (Z-A)</option>
        <option value="price-asc">Precio (menor a mayor)</option>
        <option value="price-desc">Precio (mayor a menor)</option>
        <option value="date-desc">Fecha añadido (más reciente)</option>
        <option value="date-asc">Fecha añadido (más antiguo)</option>
      </select>
    </div>

    <div class="filters-wrapper">
      <div class="filters-inner" id="filters"></div>
      <button class="show-more-btn" id="show-more-btn"></button>
    </div>

    <div id="game-count"></div>
    <div id="game-grid" class="game-grid"></div>
    <div id="last-update"></div>

    <script src="wishlist-db.js"></script>
    <script>
      const PRIORITY_GENRES = [
        "Action", "Acción",
        "Adventure", "Aventura",
        "RPG", "Rol",
        "Strategy", "Estrategia",
        "Simulation", "Simulación",
        "Horror", "Terror",
        "Indie",
        "Casual",
        "Sports", "Deportes",
        "Racing", "Carreras",
        "Free to Play", "Gratuito",
        "Early Access", "Acceso Anticipado",
        "Massively Multiplayer", "Multijugador masivo",
      ]

      let activeFilters = new Set()
      let currentSort = "priority"
      let searchQuery = ""

      function getFrequency(arr, key) {
        const freq = {}
        for (const item of arr) {
          for (const el of item[key]) {
            freq[el.description] = (freq[el.description] || 0) + 1
          }
        }
        return freq
      }

      function getPriorityIndex(name) {
        const idx = PRIORITY_GENRES.indexOf(name)
        return idx >= 0 ? idx : Infinity
      }

      function renderFilters(games) {
        const genreFreq = getFrequency(games, "genres")
        const catFreq = getFrequency(games, "categories")
        const allGenres = Object.keys(genreFreq)
        const allCats = Object.keys(catFreq)

        const priority = []
        const rest = []

        for (const g of allGenres) {
          if (getPriorityIndex(g) < Infinity) priority.push(g)
          else rest.push(g)
        }

        priority.sort((a, b) => getPriorityIndex(a) - getPriorityIndex(b))
        rest.sort((a, b) => (genreFreq[b] - genreFreq[a]) || a.localeCompare(b))
        allCats.sort((a, b) => (catFreq[b] - catFreq[a]) || a.localeCompare(b))

        const sortedFilters = [...priority, ...rest, ...allCats]

        const container = document.getElementById("filters")
        let html = '<button class="filter-btn active" data-filter="__all">Todos</button>'
        for (const f of sortedFilters) {
          html += `<button class="filter-btn" data-filter="${f}">${f}</button>`
        }
        container.innerHTML = html

        container.querySelectorAll(".filter-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const filter = btn.dataset.filter
            if (filter === "__all") {
              activeFilters.clear()
              container.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"))
              container.querySelector('[data-filter="__all"]').classList.add("active")
            } else {
              document.querySelector('[data-filter="__all"]').classList.remove("active")
              if (activeFilters.has(filter)) {
                activeFilters.delete(filter)
                btn.classList.remove("active")
              } else {
                activeFilters.add(filter)
                btn.classList.add("active")
              }
              if (activeFilters.size === 0) {
                document.querySelector('[data-filter="__all"]').classList.add("active")
              }
            }
            renderGames()
          })
        })

        const toggleBtn = document.getElementById("show-more-btn")
        const inner = container
        inner.style.maxHeight = ""

        requestAnimationFrame(() => {
          if (inner.scrollHeight > inner.clientHeight) {
            const collapsedH = inner.clientHeight + "px"
            inner.style.maxHeight = collapsedH
            toggleBtn.textContent = "▼ Ver más"
            toggleBtn.style.display = "inline-block"
            toggleBtn.onclick = () => {
              if (inner.style.maxHeight === collapsedH) {
                inner.style.maxHeight = inner.scrollHeight + "px"
                toggleBtn.textContent = "▲ Ver menos"
              } else {
                inner.style.maxHeight = collapsedH
                toggleBtn.textContent = "▼ Ver más"
              }
            }
          } else {
            inner.style.maxHeight = ""
          }
        })
      }

      function sortGames(games, sortKey) {
        const sorted = [...games]
        switch (sortKey) {
          case "name-asc":
            sorted.sort((a, b) => a.name.localeCompare(b.name))
            break
          case "name-desc":
            sorted.sort((a, b) => b.name.localeCompare(a.name))
            break
          case "price-asc":
            sorted.sort((a, b) => {
              const pa = parseFloat(a.price.replace(/[€,]/g, "")) || (a.isFree ? 0 : 999999)
              const pb = parseFloat(b.price.replace(/[€,]/g, "")) || (b.isFree ? 0 : 999999)
              return pa - pb
            })
            break
          case "price-desc":
            sorted.sort((a, b) => {
              const pa = parseFloat(a.price.replace(/[€,]/g, "")) || (a.isFree ? 0 : -1)
              const pb = parseFloat(b.price.replace(/[€,]/g, "")) || (b.isFree ? 0 : -1)
              return pb - pa
            })
            break
          case "date-desc":
            sorted.sort((a, b) => b.dateAdded - a.dateAdded)
            break
          case "date-asc":
            sorted.sort((a, b) => a.dateAdded - b.dateAdded)
            break
          default:
            sorted.sort((a, b) => a.priority - b.priority)
        }
        return sorted
      }

      function filterGames(games) {
        return games.filter(g => {
          if (searchQuery) {
            const q = searchQuery.toLowerCase()
            if (!g.name.toLowerCase().includes(q)) return false
          }

          if (activeFilters.size > 0) {
            const gameFilters = new Set([
              ...g.genres.map(x => x.description),
              ...g.categories.map(x => x.description),
            ])
            for (const f of activeFilters) {
              if (gameFilters.has(f)) return true
            }
            return false
          }

          return true
        })
      }

      function displayGames(games) {
        const gameGrid = document.getElementById("game-grid")
        const countEl = document.getElementById("game-count")
        gameGrid.innerHTML = ""

        if (games.length === 0) {
          countEl.textContent = "0 juegos encontrados"
          gameGrid.innerHTML = '<div id="empty-msg">No se encontraron juegos con esos criterios</div>'
          return
        }

        countEl.textContent = `${games.length} juego${games.length !== 1 ? "s" : ""} encontrado${games.length !== 1 ? "s" : ""}`

        for (const game of games) {
          const gameCard = document.createElement("div")
          gameCard.className = "game-card"

          const gameLink = document.createElement("a")
          gameLink.href = `https://store.steampowered.com/app/${game.appId}/`
          gameLink.target = "_blank"
          gameLink.className = "game-link"

          const gameImage = document.createElement("img")
          gameImage.src = game.headerImage
          gameImage.alt = game.name
          gameImage.loading = "lazy"

          const gameInfo = document.createElement("div")
          gameInfo.className = "game-info"

          let priceHtml = ""
          if (game.isFree) {
            priceHtml = '<span class="game-price"><strong>Precio:</strong> Gratuito</span>'
          } else if (game.comingSoon || game.price === "Próximamente") {
            priceHtml = '<span class="game-price"><strong>Precio:</strong> Próximamente</span>'
          } else if (game.originalPrice) {
            priceHtml = `<span class="game-price"><strong>Precio:</strong> <span class="original">${game.originalPrice}</span> ${game.price}<span class="discount-badge">-${game.discount}%</span></span>`
          } else {
            priceHtml = `<span class="game-price"><strong>Precio:</strong> ${game.price}</span>`
          }

          const tags = [...game.genres, ...game.categories]
            .slice(0, 4)
            .map(t => `<span class="game-tag">${t.description}</span>`)
            .join("")

          gameInfo.innerHTML = `
            <h2>${game.name}</h2>
            <div class="description">${game.description}</div>
            <div class="game-tags">${tags}</div>
            ${priceHtml}
          `

          gameLink.appendChild(gameImage)
          gameLink.appendChild(gameInfo)
          gameCard.appendChild(gameLink)
          gameGrid.appendChild(gameCard)
        }
      }

      function renderGames() {
        const filtered = filterGames(wishlistGames)
        const sorted = sortGames(filtered, currentSort)
        displayGames(sorted)
      }

      document.getElementById("search").addEventListener("input", e => {
        searchQuery = e.target.value
        renderGames()
      })

      document.getElementById("sort").addEventListener("change", e => {
        currentSort = e.target.value
        renderGames()
      })

      const modeToggle = document.getElementById("mode-toggle")
      modeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode")
      })

      renderFilters(wishlistGames)
      renderGames()

      if (wishlistLastUpdate) {
        const date = new Date(wishlistLastUpdate)
        document.getElementById("last-update").textContent =
          `Última actualización: ${date.toLocaleDateString("es-ES", {
            year: "numeric",
            month: "long",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          })}`
      }
    </script>
  </body>
</html>

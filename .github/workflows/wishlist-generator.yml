name: Regenerate Wishlist Data

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.7.0'

      - name: ⚙️ Run wishlist generator
        run: node wishlist/build-wishlist.js

      - name: 🚀 Auto-commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update wishlist-db.js [skip ci]"
          file_pattern: 'wishlist/wishlist-db.js'
